<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Logo FZ: dos "F" entrelazadas con simetría rotacional (la segunda, rotada
       180°, se lee como Z). Versión vectorial plana del logo original. -->
  <defs>
    <linearGradient id="cian" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ECBEE"/>
      <stop offset="1" stop-color="#189DC6"/>
    </linearGradient>
    <linearGradient id="plata" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#E5E8EC"/>
      <stop offset="1" stop-color="#A9AFB7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" fill="#FFFFFF"/>
  <!-- F cian -->
  <path fill="url(#cian)" d="M250 170 L620 170 L620 280 L360 280 L360 400 L560 400 L470 490 L360 490 L360 830 L250 905 Z"/>
  <!-- F plateada rotada 180° (lee como Z) -->
  <path fill="url(#plata)" transform="rotate(180 512 512)" d="M250 170 L620 170 L620 280 L360 280 L360 400 L560 400 L470 490 L360 490 L360 830 L250 905 Z"/>
</svg>
