<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Convertí este og.svg a og.png (1200×630) y subilo como /og.png -->
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#C9C1AA"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#F3F1E9"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>

  <!-- marca -->
  <g transform="translate(80,86)">
    <image href="data:image/png;base64," x="0" y="-8" width="220" height="46"/>
  </g>

  <!-- eyebrow -->
  <text x="80" y="230" font-family="'Courier New', monospace" font-size="26" letter-spacing="4" fill="#0C5D7A">CAJA · STOCK · VENTAS — SIN INTERNET</text>

  <!-- titular -->
  <text x="76" y="316" font-family="Verdana, Geneva, sans-serif" font-size="72" font-weight="bold" fill="#17150F">Probala gratis.</text>
  <text x="76" y="398" font-family="Verdana, Geneva, sans-serif" font-size="72" font-weight="bold" fill="#0C5D7A">Vendé sin internet.</text>

  <!-- subtítulo -->
  <text x="80" y="470" font-family="Verdana, Geneva, sans-serif" font-size="30" fill="#5B5648">Sistema de caja para panadería y kiosco.</text>
  <text x="80" y="512" font-family="Verdana, Geneva, sans-serif" font-size="30" fill="#5B5648">Factura ARCA. Soporte los 365 días.</text>

  <!-- chip precio -->
  <g transform="translate(80,548)">
    <rect width="476" height="52" rx="12" fill="#0C5D7A"/>
    <text x="24" y="34" font-family="Verdana, Geneva, sans-serif" font-size="21" font-weight="bold" fill="#ffffff">Gratis para probar · Pro $19.990/mes</text>
  </g>

  <!-- ticket térmico decorativo -->
  <g transform="translate(872,120)">
    <rect x="0" y="0" width="248" height="392" rx="6" fill="#FBFAF3" stroke="#DED8C6"/>
    <text x="124" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#1b1b1b">DASHBOX</text>
    <line x1="24" y1="76" x2="224" y2="76" stroke="#bdbdbd" stroke-dasharray="5 5"/>
    <g font-family="'Courier New', monospace" font-size="17" fill="#333">
      <text x="24" y="112">Pan francés</text><text x="224" y="112" text-anchor="end">$2.550</text>
      <text x="24" y="146">Facturas x6</text><text x="224" y="146" text-anchor="end">$3.600</text>
      <text x="24" y="180">Medialunas</text><text x="224" y="180" text-anchor="end">$7.200</text>
    </g>
    <line x1="24" y1="206" x2="224" y2="206" stroke="#bdbdbd" stroke-dasharray="5 5"/>
    <g font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#1b1b1b">
      <text x="24" y="244">TOTAL</text><text x="224" y="244" text-anchor="end">$13.350</text>
    </g>
    <rect x="70" y="300" width="108" height="30" rx="4" fill="none" stroke="#1b1b1b"/>
    <text x="124" y="320" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#1b1b1b">NO FISCAL</text>
    <text x="124" y="360" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#6a6a6a">¡Gracias! · DASHBOX</text>
  </g>
</svg>
